services:
  garmin-pull:
    build: .
    container_name: garmin-pull
    restart: unless-stopped
    env_file: .env
    ports:
      - "1262:8080"
    volumes:
      - ./tokens:/app/tokens
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
